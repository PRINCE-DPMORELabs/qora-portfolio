<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            background: #0e0e10;
            color: #ffffff;
            scroll-behavior: smooth;
        }
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem;
        }
        nav a {
            color: #ffffff;
            margin: 0 15px;
            text-decoration: none;
        }
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('your-hero-image-url.jpg') no-repeat center center / cover;
        }
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            max-width: 300px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .gallery img {
            width: 100%;
            border-radius: 10px;
        }
        .contact-form {
            display: flex;
            flex-direction: column;
        }
        .contact-form input, .contact-form textarea {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }
        @media (max-width: 768px) {
            .gallery {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
    <title>Portfolio</title>
</head>
<body>
<nav>
    <a href="#home">Home</a>
    <a href="#swaara">SWAARA Project</a>
    <a href="#qora-ai">QORA AI</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
</nav>
<div class="hero" id="home">
    <h1>Welcome to My Portfolio</h1>
</div>
<div class="container">
    <section id="swaara">
        <div class="card">
            <h2>SWAARA Project</h2>
            <p>Description of the SWAARA Project.</p>
        </div>
    </section>
    <section id="qora-ai">
        <div class="card">
            <h2>QORA AI</h2>
            <p>Description of the QORA AI section.</p>
        </div>
    </section>
    <section id="gallery">
        <h2>Gallery</h2>
        <div class="gallery">
            <img src="your-image-url1.jpg" alt="3D Render 1">
            <img src="your-image-url2.jpg" alt="3D Render 2">
            <img src="your-image-url3.jpg" alt="3D Render 3">
        </div>
    </section>
    <section id="contact">
        <h2>Contact Me</h2>
        <form class="contact-form" method="post">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>
</div>
</body>
</html>
